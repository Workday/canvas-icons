name: Pull Request

on: pull_request

jobs:
  install:
    runs-on: ubuntu-latest
    outputs:
      last_commit_message: ${{ steps.last_commit_message.outputs.last_commit_message }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Get last commit message
        id: last_commit_message
        run: |
          echo "last_commit_message=$(git log -1 --pretty=%s)" >> "$GITHUB_OUTPUT"

  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: Workday/canvas-kit-actions/install@v1
        with:
          node_version: 24.x

      - name: Build project graph
        shell: bash
        run: npx nx show projects
        env:
          NX_DAEMON: 'false'

      - name: Build project
        shell: bash
        run: yarn build

      - name: Lint
        shell: bash
        run: yarn lint

      - name: Type Check
        shell: bash
        run: yarn typecheck

  chromatic-cypress:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: Workday/canvas-kit-actions/install@v1
        with:
          node_version: 24.x

      - name: Cypress run
        uses: cypress-io/github-action@v7
        with:
          start: yarn cy:app
          wait-on: 'http://localhost:4173'
          record: true
          parallel: true
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CYPRESS_CACHE_FOLDER: .cache/cypress
          COMMIT_INFO_MESSAGE: ${{ needs.install.outputs.last_commit_message }}
          COMMIT_INFO_SHA: ${{github.event.pull_request.head.sha}}
          ELECTRON_EXTRA_LAUNCH_ARGS: --remote-debugging-port=9222

      - uses: chromaui/action@v17
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          cypress: true
          exitOnceUploaded: false
          exitZeroOnChanges: true
          skip: '@(renovate/**|dependabot/**)'
