name: Pull Request

on: pull_request

jobs:
  install:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: Workday/canvas-kit-actions/install@v1
        with:
          node_version: 22.x

  check:
    runs-on: ubuntu-latest
    needs: install

    steps:
      - uses: actions/checkout@v4

      - uses: Workday/canvas-kit-actions/install@v1
        with:
          node_version: 22.x

      - name: Build project graph
        shell: bash
        run: npx nx show projects
        env:
          NX_DAEMON: 'false'

      - name: Lint
        shell: bash
        run: yarn lint

      - name: Type Check
        shell: bash
        run: yarn typecheck
