name: Pull Request

on: pull_request

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: Workday/canvas-kit-actions/install@v2
        with:
          node_version: 24.x

      - name: Build project graph
        shell: bash
        run: npx nx show projects
        env:
          NX_DAEMON: 'false'

      - name: Build project
        shell: bash
        run: yarn build

      - name: Lint
        shell: bash
        run: yarn lint

      - name: Type Check
        shell: bash
        run: yarn typecheck

  chromatic-cypress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: Workday/canvas-kit-actions/install@v2
        with:
          node_version: 24.x

      - name: Get last commit message
        id: commit_log
        run: |
          echo "last_commit_message=$(git log -1 --pretty=%s)" >> "$GITHUB_OUTPUT"

      - name: Cypress run
        uses: cypress-io/github-action@fa4a118725a8f001170d49631ea89e5d66fee626 # v7.4.1
        with:
          start: yarn cy:app
          wait-on: 'http://localhost:4173'
          record: true
          parallel: true
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CYPRESS_CACHE_FOLDER: .cache/cypress
          COMMIT_INFO_MESSAGE: ${{ steps.commit_log.outputs.last_commit_message }}
          COMMIT_INFO_SHA: ${{github.event.pull_request.head.sha}}
          ELECTRON_EXTRA_LAUNCH_ARGS: --remote-debugging-port=9222

      - uses: chromaui/action@94713c544284a14195de3b50ef24301579f1877e # v18.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          projectToken: chpt_fb013199850d822
          cypress: true
          exitOnceUploaded: false
          exitZeroOnChanges: true
          skip: '@(renovate/**|dependabot/**)'
