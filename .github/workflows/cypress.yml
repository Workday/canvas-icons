name: Cypress + Chromatic

on: pull_request

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Workday/canvas-kit-actions/install@v1
        with:
          node_version: 24.x

  build:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: Workday/canvas-kit-actions/install@v1
        with:
          node_version: 24.x
      # TODO: uncomment once icon packages are migrated
      # - name: Build icon packages
      #   run: yarn cy:build
      - name: Cache build
        uses: actions/cache@v4
        with:
          path: packages/*/dist
          key: ${{ runner.os }}-icons-dist-${{ github.sha }}

  cypress-chromatic:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: Workday/canvas-kit-actions/install@v1
        with:
          node_version: 24.x
      - name: Restore build
        uses: actions/cache@v4
        with:
          path: packages/*/dist
          key: ${{ runner.os }}-icons-dist-${{ github.sha }}
      - name: Run Cypress component tests
        run: yarn cy:run
        env:
          CYPRESS_CACHE_FOLDER: .cache/cypress
      - uses: chromaui/action@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          projectToken: ${{ secrets.CHROMATIC_APP_CODE }}
          cypress: true
          exitOnceUploaded: false
          exitZeroOnChanges: true
