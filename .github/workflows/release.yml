name: Release
on:
  push:
    branches:
      - main
      - preminor/*
      - premajor/*
  workflow_dispatch:
    inputs:
      version:
        description: 'Select the type of version bump'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      package:
        description: 'Select the packages to publish'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - system
          - expressive

permissions:
  id-token: write  # Required for OIDC
  contents: write

jobs:
  setup:
    if: |
      (github.event_name == 'push'
          && !contains(github.event.head_commit.message, '[skip release]')
          && (startsWith(github.event.head_commit.message, 'fix')
              || startsWith(github.event.head_commit.message, 'feat')))
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      system-version: ${{ steps.determine.outputs.system-version }}
      expressive-version: ${{ steps.determine.outputs.expressive-version }}
      preid: ${{ steps.determine.outputs.preid }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0 # Used for conventional commit ranges

      - name: Cache node modules
        id: yarn-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-24.x-node-modules-hash-${{ hashFiles('yarn.lock') }}

      - name: Install Packages
        if: steps.yarn-cache.outputs.cache-hit != 'true'
        shell: bash
        run: yarn install --production=false

      - name: Save cache
        if: steps.yarn-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-24.x-node-modules-hash-${{ hashFiles('yarn.lock') }}

      - name: Collect changed files
        id: changed_files
        if: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
        shell: bash
        run: |
          # For pushes (including the very first one with `before` == 000...) fall
          # back to inspecting the head commit on its own.
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            FILES=$(git diff-tree --no-commit-id --name-only -r HEAD)
          else
            FILES=$(git diff --name-only "$BEFORE" "${{ github.sha }}")
          fi
          {
            echo "files<<EOF"
            echo "$FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Determine packages to release
        id: determine
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BRANCH: ${{ github.ref_name }}
          HEAD_COMMIT: ${{ github.event.head_commit.message }}
          CHANGED_FILES: ${{ steps.changed_files.outputs.files }}
          VERSION: ${{ inputs.version }}
          PACKAGE: ${{ inputs.package }}
        run: node utils/getPackagesForRelease.js

      - name: Log determine outputs
        shell: bash
        run: |
          echo "system-version: ${{ steps.determine.outputs.system-version }}"
          echo "expressive-version: ${{ steps.determine.outputs.expressive-version }}"
          echo "preid: ${{ steps.determine.outputs.preid }}"

  release-system:
    needs: setup
    if: ${{ needs.setup.outputs.system-version != '' }}
    runs-on: ubuntu-latest
    steps:
      ## We don't persist credentials because we need a Personal Access Token to
      ## push on a branch that is protected. See
      ## https://github.com/cycjimmy/semantic-release-action#basic-usage
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          # Do NOT set registry-url - it creates token-based auth that conflicts with OIDC

      - name: Cache node modules
        id: yarn-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-24.x-node-modules-hash-${{ hashFiles('yarn.lock') }}

      - name: Install Packages
        if: steps.yarn-cache.outputs.cache-hit != 'true'
        shell: bash
        run: yarn install --production=false

      # Upgrade npm to 11.10.1+ for OIDC support (Node.js 24.x comes with npm 11.x)
      - name: Upgrade npm for OIDC support
        run: npm install -g npm@11.10.1

      - name: Config git user
        shell: bash
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Pull prerelease branch
        if: |
          github.event_name == 'workflow_dispatch'
          && (inputs.version != 'patch')
          && (inputs.package != 'expressive')
        shell: bash
        run: git pull origin pre${{ inputs.version }}/system

      - name: Release @workday/canvas-system-icons-web
        uses: Workday/canvas-kit-actions/do-release@v1
        with:
          ghToken: ${{ secrets.GH_RW_TOKEN }}
          package: '@workday/canvas-system-icons-web'
          packagePath: packages/canvas-system-icons-web
          version: ${{ needs.setup.outputs.system-version }}
          buildScript: yarn build:web:system
          prerelease: ${{ needs.setup.outputs.preid != '' }}
          preid: ${{ needs.setup.outputs.preid }}
          skipGithubRelease: ${{ needs.setup.outputs.preid != '' }}
          skipCreateTag: true

  release-expressive:
    needs: [setup, release-system]
    if: |
      always()
      && (needs.release-system.result == 'success' || needs.release-system.result == 'skipped')
      && needs.setup.outputs.expressive-version != ''
    runs-on: ubuntu-latest
    steps:
      # Check out the tip of the branch (not the triggering SHA) so we include
      # any commit that release-system just pushed; otherwise this job's push
      # will be rejected as "branch is not up to date".
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Cache node modules
        id: yarn-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-24.x-node-modules-hash-${{ hashFiles('yarn.lock') }}

      - name: Install Packages
        if: steps.yarn-cache.outputs.cache-hit != 'true'
        shell: bash
        run: yarn install --production=false

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@11.10.1

      - name: Config git user
        shell: bash
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Pull prerelease branch
        if: |
          github.event_name == 'workflow_dispatch'
          && (inputs.version != 'patch')
          && (inputs.package != 'system')
        shell: bash
        run: git pull origin pre${{ inputs.version }}/expressive

      - name: Release @workday/canvas-expressive-icons-web
        uses: Workday/canvas-kit-actions/do-release@v1
        with:
          ghToken: ${{ secrets.GH_RW_TOKEN }}
          package: '@workday/canvas-expressive-icons-web'
          packagePath: packages/canvas-expressive-icons-web
          version: ${{ needs.setup.outputs.expressive-version }}
          buildScript: yarn build:web:expressive
          prerelease: ${{ needs.setup.outputs.preid != '' }}
          preid: ${{ needs.setup.outputs.preid }}
          skipGithubRelease: ${{ needs.setup.outputs.preid != '' }}
          skipCreateTag: true
